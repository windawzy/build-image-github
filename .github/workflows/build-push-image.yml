name: Build and Push Image
run-name: Build and Push Image

on: [push]

permissions:
contents: read
packages: write

jobs:
build-push-image:
runs-on: ubuntu-latest

```
steps:
  - name: Check out repository code
    uses: actions/checkout@v4

  - name: Login ke Registry Adinusa
    run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.adinusa.id -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

  - name: Build image
    run: docker build -t imageku .

  - name: List image
    run: docker images

  - name: Cek isi image
    run: docker history imageku:latest

  - name: Login to GitHub Registry
    run: echo "${{ secrets.TOKEN_GITHUB }}" | docker login ghcr.io -u windawzy --password-stdin

  - name: Tag image
    run: docker tag imageku ghcr.io/windawzy/imageku:latest

  - name: Push Image
    run: docker push ghcr.io/windawzy/imageku:latest

  - name: Logout
    run: |
      docker logout registry.adinusa.id
      docker logout ghcr.io
```


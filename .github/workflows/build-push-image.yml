name: CI Docker Build & Push

on:
push:
branches: [ "main" ]

permissions:
contents: read
packages: write

jobs:
docker:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login ke GitHub Container Registry
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.TOKEN_GITHUB }}

  - name: Build & Push Image
    uses: docker/build-push-action@v5
    with:
      context: .
      push: true
      tags: ghcr.io/windawzy/build-image-github:latest

  - name: Verifikasi Image
    run: docker pull ghcr.io/windawzy/build-image-github:latest
```

